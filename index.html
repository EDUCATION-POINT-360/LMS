<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Point LMS</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="app-layout">
        <header class="mobile-navbar" id="mobile-top-bar" style="display: none;">
            <div class="brand-wrapper">
                <i data-lucide="graduation-cap"></i>
                <span>Education Point</span>
            </div>
            <button id="mobile-menu-toggle-btn"><i data-lucide="menu"></i></button>
        </header>

        <aside class="sidebar" id="app-sidebar" style="display: none;">
            <div class="top-segment">
                <div class="brand-wrapper hidden-on-mobile">
                    <i data-lucide="graduation-cap"></i>
                    <span>Education Point</span>
                </div>
                <ul class="nav-links" id="sidebar-menu-target">
                    </ul>
            </div>
            <div class="bottom-segment" id="user-profile-summary-target">
                </div>
        </aside>

        <main class="workspace" id="main-stage-target">
            <div class="initialization-flex-container">
                <div class="bento-card text-center">
                    <h2>Initializing System Infrastructure...</h2>
                    <p style="color: var(--text-muted); margin-top: 10px;">Connecting secure real-time encryption bridges.</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
